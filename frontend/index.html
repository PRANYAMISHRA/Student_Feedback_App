<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="container">


    <h1>Student Feedback App</h1>

    <form id="feedbackForm>"
        <label for="studentName">Student Name:</label>
        <input type="text" id="studentName" placeholder="Enter your full  name" required>


        <br><br>

        <label for="regNo">Registeration Number:</label>
        <input type="text" id="regNo" placeholder="Enter your Registeration Number" required>


        <br><br>

        <label for="department">Department:</label>
        <input type="text" id="department" placeholder="Enter your department" required>
        <br><br>

        <label for="semester">Semester:</label>
        <input type="number" id="semester" placeholder="Enter semester" min="1" max="8" required>


        <br><br>


        <label for="course">Course:</label>
        <input type="text" id="course" placeholder="Enter course name" required>


        <br><br>


        <label for="faculty">Faculty Name:</label>
        <input type="text" id="faculty" placeholder="Enter faculty name" required>


        <br><br>


        <label for="feedback">Feedback:</label>
        <textarea id="feedback" rows="5" cols="40" placeholder="Write your feedback here..." required></textarea>


        <br><br>


        <label>Rating:</label>
<div class="rating">
    <label><input type="radio" name="rating" value="1"> ⭐</label>
    <label><input type="radio" name="rating" value="2"> ⭐⭐</label>
    <label><input type="radio" name="rating" value="3"> ⭐⭐⭐</label>
    <label><input type="radio" name="rating" value="4"> ⭐⭐⭐⭐</label>
    <label><input type="radio" name="rating" value="5"> ⭐⭐⭐⭐⭐</label>
</div>

        

        <label>
            <input type="checkbox" id="anonymous">
            Submit feedback anonymously
        </label>


        


        <button type="submit">Submit Feedback</button>

    </form>
   </div> 

   <script src="script.js"></script>
   

</body>
</html>
